services:
  backrest-config-backup:
    platform: linux/amd64
    image: ghcr.io/frostwalk/backrest-config-backup:latest
    restart: unless-stopped
    user: "${BACKREST_UID:-0}:${BACKREST_GID:-0}"
    environment:
      CONFIG_PATH: /data/config.json
      S3_BUCKET: your-bucket
      S3_PREFIX: backrest
      AWS_REGION: us-east-1
      S3_ENDPOINT: https://s3.your-provider.example
      AGE_PASSPHRASE_FILE: /run/secrets/age_passphrase
      CRON_SCHEDULE: "*/30 * * * *"
      TZ: Europe/Rome
      HEALTHCHECKS_URL: https://hc-ping.com/your-uuid
      RUN_TIMEOUT: 2m
      # If enabled, bypasses cron, runs once, and exits.
      # RUN_ONCE: "true"
      # Credentials may be provided by env vars or workload identity.
      # AWS_ACCESS_KEY_ID: your-access-key
      # AWS_SECRET_ACCESS_KEY: your-secret-key
    secrets:
      - age_passphrase
    volumes:
      - ./config.json:/data/config.json:ro

secrets:
  age_passphrase:
    file: ./age_passphrase.txt
